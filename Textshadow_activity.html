<!DOCTYPE html>
<html>

<head>
    <style>
        *{
          text-align: center;
          font-family: monospace;
        }
        #text{
           text-shadow: 2px 2px 1px #ffa5ee
           /* (right-offset)px (lestoffset)px (fade)px colour*/
        }
        #box{
           box-shadow: 9px 9px 5px #a5ffcd
           /* (right-offset)px (lestoffset)px (fade)px colour*/
        }
        #indent{
            text-indent: 50%; //16px or-3cm
        }
    </style>
 </head>

  <body>
    <h1 id="text">We can use text-shadow to give shadow to the text itself</h1>
      
    <h1 id="box">Or we can use box-shadow to give shadow to the element</h1>

    <div>
        <p>This is an example of text-indent.</p>
        <p id="indent">This is an example of text-indent.</p>
    </div>

   </body>

   </html>
